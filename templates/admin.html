<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Admin</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <h1>Files</h1>
    <form method="post" action="/admin/logout">
      <button type="submit">Logout</button>
    </form>
    <table>
      <thead>
        <tr><th>Link</th><th>Name</th><th>Size</th><th>Expires</th><th></th></tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          <td><a href="/f/{{ row.link_id }}">{{ row.link_id }}</a></td>
          <td>{{ row.name }}</td>
          <td>{{ row.size }}</td>
          <td>{{ row.expires }}</td>
          <td>
            <form method="post" action="/admin/delete" style="display:inline">
              <input type="hidden" name="link_id" value="{{ row.link_id }}" />
              <button type="submit">Delete</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </main>
</body>
</html>
