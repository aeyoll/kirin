{% extends "base.html" %}
{% block title %}{{ tr["delete_done.message"] }}{% endblock %}

{% endblock %}
{% block main %}
<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900/50 dark:shadow-none">
  <p class="text-slate-700 dark:text-slate-300">{{ tr["delete_done.message"] }}</p>
  <p class="mt-8">
    <a href="/" class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700 dark:focus:ring-offset-slate-950">{{ tr["common.back_home"] }}</a>
  </p>
</div>
{% endblock %}
{% block footer %}{% endblock %}
