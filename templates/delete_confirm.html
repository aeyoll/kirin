<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Delete file</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <h1>Confirm deletion</h1>
    <p>Delete "{{ original_name }}" ({{ size_human }})?</p>
    <form method="post" action="/f/{{ link_id }}?d={{ delete_code }}" enctype="multipart/form-data">
      <input type="hidden" name="confirm" value="1" />
      <button type="submit">Delete</button>
    </form>
  </main>
</body>
</html>
