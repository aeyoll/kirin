{% extends "base.html" %}
{% block title %}Delete file{% endblock %}
{% block page_header %}
<h1 class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-white sm:text-3xl">Confirm deletion</h1>
<p class="text-slate-600 dark:text-slate-400">This action cannot be undone.</p>
{% endblock %}
{% block main %}
<div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900/50 dark:shadow-none">
  <p class="text-slate-700 dark:text-slate-300">
    Delete <span class="font-semibold text-slate-900 dark:text-white">"{{ original_name }}"</span>
    <span class="text-slate-500 dark:text-slate-400">({{ size_human }})</span>?
  </p>
  <form method="post" action="/f/{{ link_id }}?d={{ delete_code }}" enctype="multipart/form-data" class="mt-8 flex flex-wrap gap-3">
    <input type="hidden" name="confirm" value="1" />
    <button
      type="submit"
      class="inline-flex items-center justify-center rounded-lg bg-red-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-red-500 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 dark:bg-red-500 dark:hover:bg-red-400 dark:focus:ring-offset-slate-950"
    >Delete permanently</button>
  </form>
</div>
{% endblock %}
{% block footer %}{% endblock %}
